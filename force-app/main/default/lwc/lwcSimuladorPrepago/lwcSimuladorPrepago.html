<template>
  <template if:true={isModalOpen}>
    <!-- Modal/Popup Box LWC starts here -->
    <section
      role="dialog"
      tabindex="-1"
      aria-labelledby="modal-heading-01"
      aria-modal="true"
      aria-describedby="modal-content-id-1"
      class="slds-modal slds-fade-in-open"
    >
      <div class="slds-modal__container">
        <!-- Modal/Popup Box LWC header here -->
        <button
          class="slds-button slds-button_icon slds-modal__close slds-button_icon-inverse"
          title="Close"
          onclick={closeModal}
        >
          <lightning-icon
            icon-name="utility:close"
            alternative-text="close"
            variant="inverse"
            size="small"
          ></lightning-icon>
          <span class="slds-assistive-text">Close</span>
        </button>
        <div class="slds-modal__header">
          <h1 id="modal-heading-01" class="slds-modal__title slds-hyphenate">Simulación</h1>
        </div>
        <!-- Modal/Popup Box LWC body starts here -->
        <div class="slds-modal__content" id="modal-content-id-1">
          <!-- <form> -->
          <h2 class="slds-page-header slds-page-header__title" style="color: #ffffff; background-color: #1b5297">
            &nbsp;&nbsp;Financiamiento Prepago
          </h2>
          <div class="slds-grid slds-wrap">
            <div
              class="slds-box_x-small slds-col slds-p-around_small slds-size_2-of-4"
              style="font-size: 120%; font-weight: bold; background-color: #e6e6e6da"
            >
              &nbsp;&nbsp;Parámetros a simular
            </div>
            <div
              class="slds-box_x-small slds-col slds-p-around_small slds-size_2-of-4"
              style="font-size: 120%; font-weight: bold; background-color: #e6e6e6da"
            >
              &nbsp;&nbsp;Resultado de la simulación
            </div>
            <div class="slds-col slds-grid slds-grid_vertical slds-size_1-of-2">
              <div class="slds-col slds-p-horizontal_small slds-p-top_x-small slds-size_1-of-1">
                <lightning-combobox
                  name="ModalidadPrepago"
                  label="Modalidad Prepago"
                  value=""
                  placeholder="Selecciona la Acción"
                  options={options}
                  onchange={handleChange}
                  required
                ></lightning-combobox>
              </div>
              <div class="slds-col slds-p-horizontal_small slds-p-top_x-small slds-size_1-of-1">
                <lightning-input
                  data-type="Monto_Prepago"
                  type="number"
                  name="MontoPrepago"
                  label="Monto Prepago"
                  onkeyup={handleInputChange}
                  required
                ></lightning-input>
              </div>
              <div class="slds-col slds-grid slds-size_1-of-1">
                <div class="slds-col slds-p-horizontal_small slds-p-top_x-small slds-size_1-of-2">
                  <lightning-input
                    data-type="Saldo_Nro_Cuotas"
                    type="number"
                    name="vSaldoNCuotasPrepago"
                    label="Saldo N° Cuotas Prepago"
                    disabled
                    value={saldoNroCuotasPrepago}
                    onkeyup={handleInputChange}
                    required={hacerObligatorio}
                  ></lightning-input>
                </div>
                <div class="slds-col slds-p-horizontal_small slds-p-top_x-small slds-size_1-of-2">
                  <lightning-input
                    type="number"
                    name="TotalDeCuotasSaldo"
                    label="Total De Cuotas Saldo"
                    disabled
                    value={numCuotas}
                  ></lightning-input>
                </div>
              </div>
              <div class="slds-col slds-grid slds-size_1-of-1">
                <div class="slds-col slds-p-horizontal_small slds-p-top_x-small slds-size_1-of-2">
                  <lightning-input
                    data-type="Fecha_Prepago"
                    type="date"
                    min={fecCuotaSaldoIni}
                    name="vFechaPrepago"
                    label="Fecha Prepago"
                    onchange={handleInputChange}
                    value={fechaPrepago}
                    required
                  ></lightning-input>
                </div>
                <div class="slds-col slds-p-horizontal_small slds-p-top_x-small slds-size_1-of-4">
                  <lightning-input
                    type="date"
                    name="FechaPrimeraCuotaSaldo"
                    label="Fecha Primera Cuota Saldo"
                    value={fecCuotaSaldoIni}
                    disabled
                  ></lightning-input>
                </div>
                <div class="slds-col slds-p-horizontal_small slds-p-top_x-small slds-size_1-of-4">
                  <lightning-input
                    type="date"
                    name="FechaUltimaCuotaSaldoOriginal"
                    label="Fecha Ultima Cuota Saldo"
                    value={fecCuotaSaldoFin}
                    disabled
                  ></lightning-input>
                </div>
              </div>
              <div class="slds-col slds-p-horizontal_small slds-p-vertical_x-small slds-size_1-of-1">
                <lightning-input
                  data-type="nroProforma"
                  type="text"
                  value={nroProforma}
                  name="vProforma"
                  label="Proforma"
                  disabled
                ></lightning-input>
              </div>
            </div>
            <div class="slds-col slds-grid slds-grid_vertical slds-size_1-of-2">
              <template if:false={mostrarDiferenciaDeCuotas}>
                <div class="slds-col slds-p-horizontal_small slds-m-vertical_x-large slds-size_1-of-1">
                  <!-- <lightning-input
                  type={tipoDeInput}
                  formatter="currency"  
                  name="vCuotasFacilote"
                  label="Cuotas Facilote (1-2)"
                  value={cuotaFacilote}
                  disabled
                ></lightning-input> -->
                </div>
              </template>
              <div class="slds-col slds-p-horizontal_small slds-p-top_x-small slds-size_1-of-1">
                <lightning-input
                  type="number"
                  formatter="currency"
                  name="vCuotasRestantes"
                  label={cuotasRestantes}
                  value={cuotasInicialRestantes}
                  disabled
                ></lightning-input>
              </div>
              <div class="slds-col slds-p-horizontal_small slds-p-top_x-small slds-size_1-of-1">
                <lightning-input
                  style={negrita}
                  type="number"
                  formatter="currency"
                  name="vCuotaSaldoAnteriorAPrepago"
                  label="Cuota Saldo Anterior a Prepago"
                  value={monotocuotafinan}
                  disabled
                ></lightning-input>
              </div>
              <div class="slds-col slds-p-horizontal_small slds-p-top_x-small slds-size_1-of-1">
                <lightning-input
                  style={negrita}
                  type="number"
                  formatter="currency"
                  name="vCuotaSaldoPosteriorAPrepago"
                  label="Cuota Saldo Posterior al Prepago"
                  value={cuotaSaldoPosteriorAPrepago}
                  disabled
                ></lightning-input>
              </div>
              <template if:true={mostrarDiferenciaDeCuotas}>
                <div class="slds-col slds-p-horizontal_small slds-p-top_x-small slds-size_1-of-1">
                  <lightning-input
                    style={negrita}
                    type="number"
                    formatter="currency"
                    name="MontoReducidoDeLaCuota"
                    label="Monto Reducido de la Cuota"
                    value={montoReducidoDeLaCuota}
                    disabled
                  ></lightning-input>
                </div>
              </template>
              <div class="slds-col slds-grid slds-size_1-of-1">
                <div class="slds-col slds-p-horizontal_small slds-p-vertical_x-small slds-size_1-of-2">
                  <lightning-input
                    type="number"
                    formatter="currency"
                    name="Ultima Cuota Saldo"
                    label="Ultima Cuota Saldo"
                    value={ultimaCuotaSaldo}
                    disabled
                  ></lightning-input>
                </div>
                <div class="slds-col slds-p-horizontal_small slds-p-vertical_x-small slds-size_1-of-2">
                  <lightning-input
                    type="date"
                    name="FechaUltimaCuotaSaldo"
                    label="Fecha Ultima Cuota Saldo Simulada"
                    value={fechaUltimaCuotaSaldo}
                    disabled
                  ></lightning-input>
                </div>
              </div>
            </div>
            <div
              class="slds-box_x-small slds-col slds-p-around_small slds-m-top_small slds-size_4-of-4"
              style="font-size: 120%; font-weight: bold; background-color: #e6e6e6da"
            >
              &nbsp;&nbsp;Optimización de Intereses
            </div>
            <div class="slds-col slds-p-horizontal_small slds-p-vertical_x-small slds-size_1-of-4">
              <lightning-input
                type="number"
                value={nroCuotasFinanciamientoInicial}
                name="NroCuotasFinanciamientoInicial"
                label="Nro Cuotas Financiamiento Inicial"
                disabled
              ></lightning-input>
            </div>
            <div class="slds-col slds-p-horizontal_small slds-p-vertical_x-small slds-size_1-of-4">
              <lightning-input
                type="number"
                value={nroCuotasNuevoFinanciamiento}
                name="NroCuotasNuevoFinanciamiento"
                label="Nro Cuotas Nuevo Financiamiento"
                disabled
              ></lightning-input>
            </div>
            <div class="slds-col slds-p-horizontal_small slds-p-vertical_x-small slds-size_1-of-4">
              <lightning-input
                style="font-weight: bold; -webkit-text-fill-color: black"
                type="number"
                name="ReduccionDeCuotas"
                label="Reducción de Cuotas"
                value={reduccionDeCuotas}
                disabled
              ></lightning-input>
            </div>
            <div class="slds-col slds-p-horizontal_small slds-p-vertical_x-small slds-size_1-of-4">
              <lightning-input
                style="font-weight: bold; -webkit-text-fill-color: black"
                type="number"
                formatter="currency"
                name="RebajadeIntereses"
                label="Rebaja de Intereses"
                value={rebajaDeIntereses}
                disabled
              ></lightning-input>
            </div>
            <template if:true={showSpinner}>
              <lightning-spinner alternative-text="Loading" size="medium"></lightning-spinner>
            </template>
          </div>
          <div class="slds-m-horizontal_small">
            <p style="font-weight: bold; color: #d1230c">{errorMessage}</p>
            <!-- {numCuotas}|{totalDeCuotasSaldo}<br/>{fecCuotaSaldoFin}|{fechaUltimaCuotaSaldo}<br/>{fecCuotaSaldoIni} -->
          </div>
        </div>
        <!-- Modal/Popup Box LWC footer starts here -->
        <div class="slds-modal__footer slds-float_right">
          <lightning-button label="Calcular" onclick={consultaPrepago} variant="brand"></lightning-button>
        </div>
        <!-- <div class="slds-float_right slds-p-horizontal_small">
            <lightning-button label="Imprimir PDF" onclick={abrirPDF} variant="brand"></lightning-button>
          </div> -->
      </div>
    </section>
    <div class="slds-backdrop slds-backdrop_open"></div>
  </template>
</template>
