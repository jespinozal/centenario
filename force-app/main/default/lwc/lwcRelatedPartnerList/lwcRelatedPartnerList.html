<template>
    <article class="slds-card">
        <div class="slds-card__header slds-gridd slds-p-bottom_x-small slds-border_bottom">
        <header class="slds-media slds-media_center slds-has-flexi-truncate">
            <div class="slds-media__figure">
            <span class="slds-icon_container slds-icon-standard-partners" title="Partners">
                <svg class="slds-icon slds-icon_small" aria-hidden="true">
                <use xlink:href="/_slds/icons/standard-sprite/svg/symbols.svg#partners"></use>
                </svg>
                <span class="slds-assistive-text">Socios</span>
            </span>
            </div>
            <div class="slds-media__body">
            <h2 class="slds-card__header-title">
                <a href={getViewAll} class="slds-card__header-link slds-truncate" title="Partners">
                <span>{partnerLabel}</span>
                </a>
            </h2>
            </div>
            <div class="slds-no-flex">
            <lightning-button-menu alternative-text="Show menu" icon-size="x-small" menu-alignment="right">
                <lightning-menu-item value="New" label="New" onclick={handleShow}></lightning-menu-item>
            </lightning-button-menu>
            </div>
        </header>
        </div>
        <div class="slds-card__body slds-card__body_inner">
            <template lwc:if={showPartner}>
                <template for:each={partner} for:item="part">
                    <div key={part.Id} class="slds-m-bottom_small">
                        <lightning-layout multiple-rows>
                            <!-- <lightning-layout-item size="6" flexibility="auto" padding="horizontal-small" class="slds-text-align_left"> -->
                                <lightning-layout-item size="11" flexibility="auto" padding="horizontal-small" class="slds-text-align_left">
                                <lightning-tile label={part.Name}  href={part.PartnerUrl}>
                                    <dl class="slds-dl_horizontal">
                                        <dt class="slds-dl_horizontal__label">
                                            <p class="slds-truncate" title="Mobile">Mobile:</p>
                                        </dt>
                                        <dd class="slds-dl_horizontal__detail slds-tile__meta">
                                            <p class="slds-truncate slds-m-left_large" title="Role">{part.PersonMobilePhone}</p>
                                        </dd>
                                    </dl>
                                    <dl class="slds-dl_horizontal">
                                        <dt class="slds-dl_horizontal__label">
                                            <p class="slds-truncate" title="Email">Email:</p>
                                        </dt>
                                        <dd class="slds-dl_horizontal__detail slds-tile__meta">
                                            <p class="slds-truncate slds-m-left_large" title="Email">{part.PersonEmail}</p>
                                        </dd>
                                    </dl>
                                </lightning-tile>
                              </lightning-layout-item>
                              <lightning-layout-item size="1" flexibility="auto" padding="horizontal-small" class="slds-text-align_right">
                                <div class="slds-no-flex">
                                    <lightning-button-menu alternative-text="Show menu" icon-size="x-small" menu-alignment="right">
                                        <lightning-menu-item value="Delete" data-id={part.Id} label="Delete" onclick={handleDelete2}></lightning-menu-item>
                                    </lightning-button-menu>
                                </div>
                              </lightning-layout-item>
                    </lightning-layout>
                    </div>
                </template>
            </template>
            <template lwc:else>
            </template>
        </div>
        <footer class="slds-card__footer">
        <template lwc:if={showPartner}>
            <a class="slds-card__footer-action" href={getViewAll} >Ver Todos
                <span class="slds-assistive-text">Partner</span>
            </a>
        </template>
        </footer>
    </article>

    <c-lwc-add-partner source="lwc/lwcRelatedPartnerList" item={recordId} onsendmessage={parentHandler} slot="footer">
        Create a message modal overlayed on the current app window (see
        myModal component).
    </c-lwc-add-partner>
   
</template>
