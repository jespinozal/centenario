<template>
    <lightning-card  variant="Narrow"  title="Simular Prepago" icon-name="standard:ai_accelerator_card">
        <!--BOTONES DE ACCION-->
        <template if:true={financiamientoActivo}>
        <p class="slds-p-horizontal_small">
            <lightning-radio-group name="radioInicial"
            label="Seleccionar:"
            options={optionsRadioInicial}
            value={value}
            type="radio"
            onchange={seleccionRadioInicial}></lightning-radio-group>
        </p>
            <lightning-button variant="border-filled" label="Siguiente" slot="footer" title="Siguiente" onclick={openModal} class="slds-m-left_x-small" disabled={desactivarBotonSiguienteInicial}></lightning-button>
        </template>
        <template if:true={financiamientoInactivo}>
            <p style="text-align: center; color:red;">
                <strong>Advertencia</strong>
            </p>
            <p style="text-align: center;">
                Para poder realizar la simulación de Prepago, deberá seleccionar previamente un <strong>financiamiento activo.</strong>
            </p>
        </template>
        </lightning-card>
    <!-- MODAL DE COMPONENTE-->
    <template if:true={isModalOpen}>
        <section role="dialog" tabindex="-1" aria-labelledby="modal-heading-01" aria-modal="true" aria-describedby="modal-content-id-1" class="slds-modal slds-fade-in-open slds-modal_medium slds-backdrop">
            <div class="slds-modal__container" >
                <template if:true={mostrarSpinner} style="height: 200px; position:relative">
                    <lightning-spinner alternative-text="Loading" variant="base" size="medium"></lightning-spinner>
                </template>
                <!-- HEADER DE MODAL -->
                <header class="slds-modal__header">
                    <!-- BOTON PARA CERRAR EL MODAL-->
                    <button class="slds-button slds-button_icon slds-modal__close slds-button_icon-inverse" title="Cerrar" onclick={closeModal}>
                        <lightning-icon icon-name="utility:close"
                            alternative-text="Cerrar"
                            variant="brand"
                            size="small" ></lightning-icon>
                        <label class="slds-assistive-text">Cerrar</label>
                    </button>
                    <!-- TITULO DE HEADER-->
                    <h2 id="modal-heading-01" class="slds-text-heading_medium slds-hyphenate">{tituloModalSimulacion}</h2>
                </header>
                <!-- BODY DE MODAL-->
                <div class="slds-modal__content slds-var-p-around_large" id="modal-content-id-1">

                    <lightning-progress-indicator current-step={pasoSeleccionado} type="base" variant="base">
                        <template for:each={steps} for:item="step">
                            <lightning-progress-step label={step.label} value={step.value} key={step.label}></lightning-progress-step>
                        </template>
                    </lightning-progress-indicator>
                    <!--PANTALLAS DE SIMULACION DE PREPAGO-->
                    <!--PANTALLA 1-->
                    <template if:true={P1SimulacionResumenFinanciamiento}>
                        <!-- sldsValidatorIgnoreNextLine -->
                        <lightning-datatable
                        key-field   =   "id"
                        data        =   {dataSimulacionResumenFinanciamiento}
                        columns     =   {columnsSimulacionResumenFinanciamiento}
                        hide-checkbox-column	
                        >
                        </lightning-datatable>
                    </template>
                    <!-- PANTALLA 2-->
                    <template if:true={P2SimulacionTipoDeCuotas}>
                        <!-- sldsValidatorIgnoreNextLine -->
                        <lightning-radio-group name="radioP2SimulacionTipoDeCuotas"
                            label="Seleccionar tipo de cuotas:"
                            options={optionsRadioP2SimulacionTipoDeCuotas}
                            value={value}
                            type="radio"
                            onchange={seleccionRadioP2SimulacionTipoDeCuotas}>
                        </lightning-radio-group>
                        <template if:true={mostrarimporteRefinanciacion}>
                            <br/>
                            <lightning-input type="number" name="importeRefinanciacion" label="Importe de Refinanciación" placeholder="Monto" onchange={importeRefinanciacionCambio}></lightning-input>
                            <lightning-input type="date" name="fechaDePrepago" label="Fecha de Prepago" value={fechaPrepago} onchange={handleFechaChange}></lightning-input>
                        </template>
                    </template>

                                <tr>

                                <td style="width: 23.155%; height: 18px; text-align: right;">{resumenPrecioDeVentas}</td>

                            <br/>
                            <lightning-datatable
                            key-field="id"
                            data={dataPreview}
                            columns={columnsPreview}
                            hide-checkbox-column
                            ></lightning-datatable>

                        <template if:true={mostrarError}>
                            <table style="border-collapse: collapse; width: 100%; height: 310px;" border="0">

                                    <td style="width: 75%; height: 18px;">{resumenMensajeServicio}</td>
                                </tr>
                            </table>

                    </template>
                    <!--PANTALLAS DE EJECUCIÓN DE PREPAGO-->

                     <template if:true={P1EjecucionValidacionDatos}>
                        <lightning-radio-group name="radioP1EjecucionValidacionDatos"
                            label="Seleccionar tipo de cuotas:"
                            options={optionsRadioP1EjecucionValidacionDatos}
                            value={valueRadioP1EjecucionValidacionDatos}
                            type="radio"
                            onchange={seleccionRadioP1EjecucionValidacionDatos}>
                        </lightning-radio-group>
                        <br/>
                            <lightning-input type="number" name="importeRefinanciacionEjecucion" label="Importe de Refinanciación" placeholder="Monto" onchange={importeRefinanciacionCambioEjecucion} value={valueimporteRefinanciacionCambioEjecucion}></lightning-input>
                            <lightning-input type="date" name="fechaDePrepago" label="Fecha de Prepago" value={fechaPrepagoEjecucion} onchange={handleFechaEjecucionChange}></lightning-input>
                            <!--BUSQUEDA DE APODERADOS-->
                            
                            <c-cen-lookup-reusable label="Apoderado 1" selected-icon-name="standard:account" object-label="Apoderado"
                                object-api-name="CEN_Apoderado__c" field-api-name="CEN_ApoderadoFormula__c" other-field-api-name="CEN_NombreApoderado__c"
                                onvalueselected={handleValueSelectedOnAccount}>
                            </c-cen-lookup-reusable>
                            <c-cen-lookup-reusable label="Apoderado 2" selected-icon-name="standard:account" object-label="Apoderado"
                                object-api-name="CEN_Apoderado__c" field-api-name="CEN_ApoderadoFormula__c" other-field-api-name="CEN_NombreApoderado__c"
                                onvalueselected={handleValueSelectedOnAccount2}>
                            </c-cen-lookup-reusable>
                     </template>
                     <template if:true={openConfirmacion}>  
                        <div class="slds-modal slds-fade-in-open slds-backdrop">
                            <div class="slds-modal__container">
                                <div class="sldas-modal__header slds-theme_warning slds-p-vertical_medium">
                                    <h3 class="slds-text-heading_medium slds-align_absolute-center">Confirmación</h3>  
                                </div>
                                <div class="slds-modal__content slds-p-around_medium">
                                    <div class="slds-align_absolute-center"> <p>¿Está seguro de Ejecutar el Prepago?</p> </div>
                                </div>
                                <div class="slds-modal__footer">  
                                    <lightning-button  class="slds-m-left_x-small" label="Cerrar" variant="brand" onclick={closeModalConfirmacion}> </lightning-button>
                                    <lightning-button  class="slds-m-left_x-small" label="Confirmar" variant="brand"  onclick={confirmacionEjecutarPrepago}>   </lightning-button>  
                                </div>  
                            </div>  
                        </div>  
                    </template>

                     <!-- GENERAR DOCUMENTOS-->
