<template>
  <template if:true={puedeVerBoton}>
    <button class="slds-button slds-button_brand" onclick={abrirModal}>
        Archivados
    </button>

    <template if:true={mostrarModal}>
        <section role="dialog" tabindex="-1" aria-modal="true" class="slds-modal slds-fade-in-open">
            <div class="slds-modal__container">
                <header class="slds-modal__header">
                    <button class="slds-button slds-button_icon slds-modal__close" title="Cerrar" onclick={cerrarModal}>
                        <lightning-icon icon-name="utility:close" alternative-text="close" size="small"></lightning-icon>
                    </button>
                    <h2 class="slds-text-heading_medium">Archivados</h2>
                </header>

                <div class="slds-modal__content slds-p-around_medium" style="max-height:70vh;overflow:auto;">
                    <c-cen-adjuntos-por-seccion
                        record-id={recordId}
                        header=""
                        es-archivado={esArchivadoTrue}>
                    </c-cen-adjuntos-por-seccion>
                </div>

                <footer class="slds-modal__footer">
                    <button class="slds-button slds-button_neutral" onclick={cerrarModal}>Cerrar</button>
                </footer>
            </div>
        </section>
        <div class="slds-backdrop slds-backdrop_open"></div>
    </template>
  </template>
</template>
