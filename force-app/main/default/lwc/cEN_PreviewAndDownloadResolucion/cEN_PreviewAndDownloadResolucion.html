<template>
  <lightning-card>
  <template for:each={filesList} for:item="file">
    <div key={file.value} class="slds-box">
      <div class="slds-grid slds-wrap">
        <div class="slds-col slds-large-size_4-of-12 slds-medium-size_4-of-12 slds-size_12-of-12">
          <p><strong>Nombre Archivo - </strong>{file.label}</p>
        </div>
        <div class="slds-col slds-large-size_4-of-12 slds-medium-size_4-of-12 slds-size_12-of-12">
          <a href={file.url} download>Descargar</a>
        </div>
        <div class="slds-col slds-large-size_4-of-12 slds-medium-size_4-of-12 slds-size_12-of-12">
          <lightning-button label="Vista Previa" variant="brand" data-id={file.value}
            onclick={previewHandler}></lightning-button>
        </div>
      </div>
    </div>
  </template>
</lightning-card>
</template>
