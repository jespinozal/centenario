<template>
  <article class="slds-card">
    <div class="slds-card__body slds-card__body_inner">
      <div class="slds-card__header slds-grid">
        <header class="slds-media slds-media_center slds-has-flexi-truncate">
          <div class="slds-media__figure">
            <lightning-icon icon-name="standard:filter" size="small"></lightning-icon>
          </div>
          <div class="slds-media__body">
            <h3>Visor de Campañas</h3>
          </div>
        </header>
      </div>
      <div class="slds-card__body slds-card__body_inner">
        <div class="slds-grid slds-wrap">
          <div class="slds-col slds-size_1-of-1 slds-large-size_12-of-12 slds-m-bottom_small">
            <div class="slds-p-vertical_x-small">Proyecto</div>
            <lightning-record-edit-form object-api-name="Product2" id="createProjectForm">
              <lightning-input-field
                field-name="CEN_Proyecto__c"
                variant="label-hidden"
                onchange={handleProjectSelection}
                required
              >
              </lightning-input-field>
            </lightning-record-edit-form>
          </div>
          <div class="slds-col slds-size_3-of-12 div_filter">
            <lightning-input
              type="text"
              name="vCampaign"
              label="Campaña"
              value={valueCampaign}
              placeholder="Ingresar descripcion campaña"
              onchange={handleCampaignSelection}
            ></lightning-input>
          </div>
          <div class="slds-col slds-size_3-of-12 slds-p-left_medium div_filter">
            <lightning-input
              type="text"
              name="vMainLever"
              label="Palanca Principal"
              value={valueLever}
              placeholder="Ingresar palanca principal"
              onchange={handleLeverSelection}
            ></lightning-input>
          </div>
          <div class="slds-col slds-size_3-of-12 slds-p-left_medium div_filter">
            <lightning-combobox
              name="vCurrency"
              label="Moneda"
              value={valueCurrency}
              placeholder="Seleccionar Moneda"
              options={optionsCurrency}
              onchange={handleCurrencySelection}
            >
            </lightning-combobox>
          </div>
          <div class="slds-col slds-size_3-of-12 slds-p-left_medium div_filter">
            <lightning-combobox
              name="vSupport"
              label="Sustento"
              value={valueSupport}
              placeholder="Seleccionar Sustento"
              options={optionsSupport}
              onchange={handleSupportSelection}
            ></lightning-combobox>
          </div>
        </div>

        <!-- <div class="slds-grid slds-wrap slds-size_1-of-1"> -->
        <!-- <div class="slds-col slds-size_3-of-12 div_filter">
            <lightning-combobox
              name="vSupport"
              label="Sustento"
              value={valueSupport}
              placeholder="Seleccionar Sustento"
              options={optionsSupport}
              onchange={handleSupportSelection}
            ></lightning-combobox>
          </div> -->
        <!-- <div class="slds-col slds-size_4-of-12 slds-p-left_medium div_filter"> -->
        <!-- Falta value de fecha -->
        <!-- <lightning-input
              type="date"
              name="vStarValidityDate"
              label="Fecha vigencia inicio"
              value={valueStartDate}
              placeholder="Ingresar Vigencia inicio"
              onchange={handleStartDateSelection}
            ></lightning-input>
          </div> -->
        <!-- <div class="slds-col slds-size_4-of-12 slds-p-left_medium div_filter"> -->
        <!-- Falta value de fecha -->
        <!-- <lightning-input
              type="date"
              name="vEndValidityDate"
              label="Fecha vigencia fin"
              value={valueEndDate}
              placeholder="Ingresar Vigencia fin"
              onchange={handleEndDateSelection}
            ></lightning-input>
          </div> -->
        <!-- </div> -->
      </div>
      <div class="slds-col slds-grid slds-wrap slds-size_1-of-1">
        <div class="slds-col slds-size_12-of-12" style="align-self: flex-end; text-align-last: center">
          <lightning-button
            variant="brand"
            label="Buscar"
            title="Buscar"
            onclick={handleSearch}
            class="slds-m-left_x-small div_filter"
          ></lightning-button>

          <lightning-button
            label="Limpiar"
            title="Limpiar"
            onclick={handleReset}
            class="slds-m-left_x-small div_filter"
          ></lightning-button>
        </div>
      </div>
      <div class="slds-card__header slds-grid slds-m-top_large">
        <header class="slds-media slds-media_center slds-has-flexi-truncate">
          <div class="slds-media__figure">
            <lightning-icon icon-name="standard:picklist_type" size="small"></lightning-icon>
          </div>
          <div class="slds-media__body">
            <h3>Lista de Campañas</h3>
          </div>
        </header>
      </div>
      <div class="slds-card__body slds-card__body_inner">
        <lightning-datatable
          key-field="id"
          columns={columns}
          min-column-width="80"
          hide-checkbox-column
          data={data}
          default-sort-direction={defaultSortDirection}
          sorted-direction={sortDirection}
          sorted-by={sortedBy}
          onsort={onHandleSort}
        >
        </lightning-datatable>
      </div>
      <div class="slds-align_absolute-center" style="height: 5rem">
        <lightning-button
          label="Prev"
          icon-name="utility:chevronleft"
          icon-position="left"
          onclick={previousHandler}
          disabled={disPre}
        >
        </lightning-button>
        <span class="slds-p-horizontal_small">
          Página: {page} de {totalPage} | Total Registro: {totalRecountCount}
        </span>
        <lightning-button
          label="Next"
          icon-name="utility:chevronright"
          icon-position="right"
          disabled={isLastPage}
          onclick={nextHandler}
        >
        </lightning-button>
      </div>
    </div>
    <template if:true={loaded}>
      <div class="slds-spinner_container">
        <lightning-spinner alternative-text="Loading"></lightning-spinner>
      </div>
    </template>
  </article>
</template>
