<template>
  
  <div class="slds-box slds-theme_default slds-text-align_center">
      <lightning-radio-group label="" 
                              name="radioButtonGroup" 
                              onchange={handleChange} 
                              options={options}
                              value={selectedValue}
                              type="button"></lightning-radio-group>
    </div>
 
<!-- Progress Ring-->
<template if:true={progressRingVisible}>
  <div class="slds-box slds-theme_default">
    <!-- OPORTUNIDAD -->
    <div class="slds-grid slds-wrap">
      <div class="slds-col slds-size_12-of-12 slds-text-align_center slds-theme_shade slds-m-bottom_small">
        ESTADO DE LA SOLICITUD
      </div>
      <div class="slds-col slds-size_1-of-12 slds-align_absolute-center">
        <lightning-progress-ring value={percentDay} variant={daysRingType} size="large">
        </lightning-progress-ring>
      </div>
      <div class="slds-col slds-size_7-of-12">
        <div class="slds-col slds-size_12-of-12">
          <span>Dias faltantes: {dayBetween}</span>
        </div>
        <div class="slds-col slds-size_12-of-12">
          <span>Fecha para firmar: {dateExperation}</span>
        </div>
        <div class="slds-col slds-size_12-of-12">
          <span>Numero de proforma: {proforma}</span>
        </div>
      </div>
     
      <template if:true={btnErrorOpp}>
      <div
        class="slds-col slds-size_4-of-12 slds-text-align_center slds-box slds-box_x-small slds-text-color_error slds-align_absolute-center"
        onclick={viewModalOppMessage}
        style="cursor: pointer"
      >
        Ver error
      </div>
    </template>
    <template if:false={btnErrorOpp}>
      <div class="slds-col slds-size_4-of-12"></div>
    </template>
      <br />
      <div class="slds-col slds-size_12-of-12"></div>
      <br />
      <div
        class="slds-col slds-size_12-of-12 slds-text-align_center slds-theme_shade slds-m-bottom_small"
      >
        ESTADO DE LOS PAGOS
      </div>
      <br />
      <div class="slds-col slds-size_1-of-12 slds-align_absolute-center">
        <lightning-progress-ring value={percentAmount} variant={amountRingType} size="large">
        </lightning-progress-ring>
      </div>
      <div class="slds-col slds-size_7-of-12">
        <div class="slds-col slds-size_12-of-12">
          <span>Monto de cuota a pagar: {currencyType} &nbsp;  
            <lightning-formatted-number value={initAmount} maximum-fraction-digits="2" minimum-fraction-digits="2"></lightning-formatted-number>
          </span>
        </div>
        <div class="slds-col slds-size_12-of-12">
          <span>Pagado a la Fecha: {currencyType} &nbsp;  
            <lightning-formatted-number value={currentAmount} maximum-fraction-digits="2" minimum-fraction-digits="2"></lightning-formatted-number>
          </span>
        </div>
        <div class="slds-col slds-size_12-of-12">
          <span>Monto por pagar: {currencyType} &nbsp;  
            <lightning-formatted-number value={difAmount} maximum-fraction-digits="2" minimum-fraction-digits="2"></lightning-formatted-number>
          </span>
        </div>
      </div>
      <br />
      <template if:true={btnErrorPayment}>
      <div
        class="slds-col slds-size_4-of-12 slds-text-align_center slds-box slds-box_x-small slds-text-color_error slds-align_absolute-center"
        onclick={viewModalPaymentMessage}
        style="cursor: pointer"
      >
        Ver error
      </div>
      </template>
      <template if:true={btnProcessingPayment}>
      <div
        class="slds-col slds-size_4-of-12 slds-text-align_center slds-box slds-box_x-small slds-align_absolute-center"
      >
        Procesando pagos ...
      </div>
      </template>
      <template if:false={btnErrorPayment}>
          <div class="slds-col slds-size_4-of-12"></div>
        </template>
    </div>
  </div>
  
</template>

<!-- Progress Bar-->
<template if:true={progressBarVisible}>
  <div class="slds-box slds-theme_default">
    <!-- OPORTUNIDAD -->
    <div class="slds-grid slds-wrap">
      <div class="slds-col slds-size_12-of-12 slds-text-align_center slds-theme_shade slds-m-bottom_small">
      ESTADO DE LA SOLICITUD
    </div>
    <div class="slds-col slds-size_12-of-12 slds-text-align_center">
      <div style="width: 100%">
        <span>Tiempo estimado para la firma de contrato</span>
      </div>
    </div>
    <div class="slds-col slds-size_12-of-12 slds-text-align_right">
        <div style={percentDay}>
          <span>{dayBetween}</span>
        </div>
      </div>
      <div class="slds-col slds-size_12-of-12 slds-text-align_center">
        <div
          class="slds-progress-bar"
          aria-valuemin="0"
          aria-valuemax="100"
          aria-valuenow="50"
          role="progressbar"
          style="background-color:red">
          <span class="slds-progress-bar__value slds-progress-bar__value_success"
            style={percentDay}></span>
        </div>
      </div>
      <div class="slds-col slds-size_12-of-12"></div>
      <div class="slds-col slds-size_4-of-12">
        <span>0</span>
      </div>
      <div class="slds-col slds-size_4-of-12 slds-text-align_center">
          <span>dias</span>
        </div>
      <div class="slds-col slds-size_4-of-12 slds-text-align_right">
        <span>{maxDays}</span>
      </div>
      <br />
    <div class="slds-col slds-size_12-of-12"></div>
    <br />
    <div class="slds-col slds-size_8-of-12 slds-align_absolute-center">
      <span>Numero de proforma =  {proforma}</span>
    </div>
    <template if:true={btnErrorOpp}>
    <div class="slds-col slds-size_4-of-12 slds-text-align_center slds-box slds-box_x-small slds-text-color_error slds-align_absolute-center"
        onclick={viewModalOppMessage}
        style="cursor: pointer"
      >
        Ver error generado
      </div>
    </template>
      <template if:false={btnErrorOpp}>
        <div class="slds-col slds-size_4-of-12"></div>
      </template>
    <br />
    <div class="slds-col slds-size_12-of-12"></div>
    <br />
    <!-- MONTO INICIAL-->
    <div class="slds-col slds-size_12-of-12 slds-text-align_center slds-theme_shade slds-m-bottom_small">
      ESTADO DE LOS PAGOS
    </div>
    <br />
    <div class="slds-col slds-size_12-of-12 slds-text-align_right">
      <div style={percentAmount}>
        <span>S/ <lightning-formatted-number value={currentAmount}></lightning-formatted-number></span>
      </div>
    </div>
    <div class="slds-col slds-size_12-of-12 slds-text-align_center">
      <div
        class="slds-progress-bar"
        aria-valuemin="0"
        aria-valuemax="100"
        aria-valuenow="90"
        role="progressbar"
        style="background-color: cornflowerblue"
      >
        <span
          class="slds-progress-bar__value slds-progress-bar__value_success"
          style={percentAmount}
        ></span>
      </div>
    </div>
    <div class="slds-col slds-size_12-of-12"></div>
    <div class="slds-col slds-size_6-of-12">
      <span>S/ 0,00</span>
    </div>
    <div class="slds-col slds-size_6-of-12 slds-text-align_right">
      <span>S/ <lightning-formatted-number value={initAmount}></lightning-formatted-number></span>
    </div>
    <br/>
    <div class="slds-col slds-size_12-of-12"></div>
    <br/>
    <div class="slds-col slds-size_8-of-12 slds-align_absolute-center">
      <span>Monto por pagar =  S/ <lightning-formatted-number value={difAmount}></lightning-formatted-number></span>
    </div>
    <template if:true={btnErrorPayment}>
    <div class="slds-col slds-size_4-of-12 slds-text-align_center slds-box slds-box_x-small slds-text-color_error slds-align_absolute-center"
        onclick={viewModalPaymentMessage}
        style="cursor: pointer">
        Ver error generado
      </div>
    </template>
    <template if:false={btnErrorPayment}>
      <div class="slds-col slds-size_4-of-12"></div>
    </template>
    </div>
  </div>
</template>
<!-- Modal Opp Message -->
<template if:true={isModalOppMessageOpen}>
  <section role="dialog" tabindex="-1" aria-labelledby="modal-heading-01" aria-modal="true" aria-describedby="modal-content-id-1" class="slds-modal slds-fade-in-open">
      <div class="slds-modal__container">
          <!-- Modal/Popup Box LWC header here -->
          <header class="slds-modal__header">
              <button class="slds-button slds-button_icon slds-modal__close slds-button_icon-inverse" title="Close" onclick={closeModalOppMessage}>
                  <lightning-icon icon-name="utility:close"
                      alternative-text="close"
                      variant="inverse"
                      size="small" ></lightning-icon>
                  <span class="slds-assistive-text">Close</span>
              </button>
              <h2 id="modal-heading-01" class="slds-text-heading_medium slds-hyphenate">Error en la oportunidad</h2>
          </header>
          <!-- Modal/Popup Box LWC body starts here -->
          <div class="slds-modal__content slds-p-around_medium" id="modal-content-id-1">
              <p><b>Error: {messageErrorOpp}
              </b></p>
              <br/>
              <p>Si el error es tecnico puede presionar el boton <b>Envia a SAP</b>, de lo contrario verificar los campos que se indican en el error</p>
          </div>
          <!-- Modal/Popup Box LWC footer starts here -->
          <footer class="slds-modal__footer">
              <!-- <button class="slds-button slds-button_neutral" onclick={sendOperationToSap} title="Envia a SAP">Envia a SAP</button> -->
              <button class="slds-button slds-button_brand" onclick={closeModalOppMessage} title="Cancel">Cerrar</button>
          </footer>
      </div>
      <template if:false={loaded}>
        <div class="slds-spinner_container">
            <lightning-spinner alternative-text="Loading"></lightning-spinner>
        </div>
      </template>
  </section>
  <div class="slds-backdrop slds-backdrop_open"></div>
</template>
<!-- Modal Payment Message -->
<template if:true={isModalPaymentMessageOpen}>
<section role="dialog" tabindex="-1" aria-labelledby="modal-heading-01" aria-modal="true" aria-describedby="modal-content-id-1" class="slds-modal slds-fade-in-open">
    <div class="slds-modal__container">
        <!-- Modal/Popup Box LWC header here -->
        <header class="slds-modal__header">
            <button class="slds-button slds-button_icon slds-modal__close slds-button_icon-inverse" title="Close" onclick={closeModalPaymentMessage}>
                <lightning-icon icon-name="utility:close"
                    alternative-text="close"
                    variant="inverse"
                    size="small" ></lightning-icon>
                <span class="slds-assistive-text">Close</span>
            </button>
            <h2 id="modal-heading-02" class="slds-text-heading_medium slds-hyphenate">Error en Pagos a SAP</h2>
        </header>
        <!-- Modal/Popup Box LWC body starts here -->
        <div class="slds-modal__content slds-p-around_medium" id="modal-content-id-2">
            <p><b>Lista de pagos con error, pendientes por enviar a SAP.
            </b></p>
            <br/>
            <div class="slds-grid slds-wrap">
              <div class="slds-text-align_center slds-size_3-of-12"><b>Numero de Orden</b></div>
                <div class="slds-text-align_center slds-size_4-of-12"><b>Estado</b></div>
                <div class="slds-text-align_center slds-size_5-of-12"><b>Mensaje de Error</b></div>
              </div>
            <template for:each={paymentsError} for:item="payment">
              <div key={payment.Id}  class="slds-grid slds-wrap">
                <div class="slds-text-align_center slds-border_left slds-border_right slds-col slds-size_3-of-12">{payment.Name}</div>
                <div class="slds-text-align_center slds-border_right  slds-col slds-size_4-of-12">{payment.CEN_PaymentStatus__c}</div>
                <div class="slds-text-align_center slds-border_right slds-col slds-size_5-of-12">{payment.CEN_MessageError__c}</div>
              
              </div>
           </template>
           <br/>
            <p>Si el error es tecnico puede presionar el boton <b>Envia a SAP</b>, de lo contrario verificar los campos que se indican en el error</p>
            <br/>
          
        </div>
        <!-- Modal/Popup Box LWC footer starts here -->
        <footer class="slds-modal__footer">
            <!-- <button class="slds-button slds-button_neutral" onclick={sendPaymentsToSap} title="Envia a SAP">Envia a SAP</button> -->
            <button class="slds-button slds-button_brand" onclick={closeModalPaymentMessage} title="Cancel">Cerrar</button>
        </footer>
    </div>
    <template if:false={loaded}>
      <div class="slds-spinner_container">
          <lightning-spinner alternative-text="Loading"></lightning-spinner>
      </div>
    </template>
</section>
<div class="slds-backdrop slds-backdrop_open"></div>

</template>

</template>
